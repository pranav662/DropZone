<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receiving File — DropZone P2P</title>
    <meta name="description" content="Receive files securely via WebRTC P2P transfer with DTLS 1.3 encryption.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;900&display=swap">
    <style>
        /* ============================================================
           DESIGN TOKENS
           ============================================================ */
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-400: #94a3b8;
            --slate-50:  #f8fafc;
            --accent-primary:   #3b82f6;
            --accent-secondary: #2dd4bf;
            --accent-indigo:    #6366f1;
            --success-primary:  #10b981;
            --success-glow:     rgba(16,185,129,0.4);
            --warning-primary:  #f59e0b;
            --red-primary:      #ef4444;
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-smooth: cubic-bezier(0.4, 0,   0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo:    cubic-bezier(0.16, 1, 0.3, 1);
            --motion-fast:       180ms;
            --motion-mid:        400ms;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: var(--slate-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Ambient Background Layer (Matched with Main App) ── */
        body::before {
            content: '';
            position: fixed;
            width: 80vw; height: 80vw;
            top: -30vw; left: -20vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
            animation: auroraDrift1 20s ease-in-out infinite alternate;
            filter: blur(70px);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 70vw; height: 70vw;
            bottom: -20vw; right: -10vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.16) 0%, transparent 70%);
            animation: auroraDrift2 25s ease-in-out infinite alternate;
            filter: blur(70px);
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraDrift1 {
            0%   { transform: translate(0,0) scale(1); opacity: 0.6; }
            50%  { opacity: 0.8; }
            100% { transform: translate(8vw, 6vw) scale(1.2); opacity: 0.6; }
        }
        @keyframes auroraDrift2 {
            0%   { transform: translate(0,0) scale(1.1); opacity: 0.5; }
            50%  { opacity: 0.7; }
            100% { transform: translate(-6vw, -8vw) scale(0.95); opacity: 0.5; }
        }

        /* Noise texture overlay */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        /* Grid lines */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .container {
            width: 100%;
            max-width: 580px;
            position: relative;
            z-index: 1;
            animation: entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes entrance {
            from { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(12px) brightness(1.2); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0)    brightness(1); }
        }

        /* ============================================================
           CARD
           ============================================================ */
        .card {
            background: rgba(13, 20, 40, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 36px;
            box-shadow:
                0 60px 140px -20px rgba(0,0,0,0.98),
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 1px 0 rgba(255,255,255,0.08) inset;
            overflow: hidden;
            position: relative;
            transition: 
                box-shadow var(--motion-mid) var(--ease-smooth),
                transform var(--motion-mid) var(--ease-out-expo),
                border-color var(--motion-mid) var(--ease-smooth);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .card:hover {
            box-shadow:
                0 80px 160px -30px rgba(0,0,0,0.99),
                0 0 0 1px rgba(255,255,255,0.06) inset,
                inset 0 1px 0 rgba(255,255,255,0.12);
            transform: translateY(-2px) rotateX(0.5deg);
        }

        /* Gradient border accent */
        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 37px;
            background: linear-gradient(135deg,
                rgba(59,130,246,0.35) 0%,
                transparent 40%,
                transparent 60%,
                rgba(99,102,241,0.20) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Shimmer sweep */
        .card::after {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: linear-gradient(115deg,
                transparent 0%,
                rgba(255,255,255,0.015) 40%,
                rgba(255,255,255,0.035) 50%,
                rgba(255,255,255,0.015) 60%,
                transparent 100%);
            animation: shimmer 10s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes shimmer {
            0%   { transform: translateX(-100%) translateY(-100%) rotate(30deg); }
            40%  { transform: translateX(100%)  translateY(100%)  rotate(30deg); }
            100% { transform: translateX(100%)  translateY(100%)  rotate(30deg); }
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            padding: 28px 36px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.012);
            position: relative;
            z-index: 1;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        /* ─── Logo Group ─── */
        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* SVG Logo Mark — professional file-sharing icon */
        .logo-mark {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-mark svg { width: 100%; height: 100%; }

        /* Static cloud nodes */
        .cloud-node {
            opacity: 0.9;
        }

        .logo-file-icon {
            animation: logoFilePulse 3s ease-in-out infinite;
        }
        @keyframes logoFilePulse {
            0%, 100% { opacity: 0.95; filter: drop-shadow(0 0 0 rgba(56,189,248,0)); }
            50%       { opacity: 1;    filter: drop-shadow(0 0 5px rgba(56,189,248,0.6)); }
        }



        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.8px;
            display: inline-flex;
            gap: 0;
            user-select: none;
        }

        .logo-letter {
            display: inline-block;
            background: linear-gradient(
                135deg,
                var(--accent-primary) 0%,
                var(--accent-secondary) 50%,
                var(--accent-indigo) 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(-20px) scale(0.8) rotate(-5deg);
            filter: blur(6px);
            animation:
                letterDropReceive 0.6s var(--ease-bounce) calc(var(--i) * 50ms + 150ms) forwards;
            position: relative;
        }

        @keyframes letterDropReceive {
            0%   { opacity: 0; transform: translateY(-20px) scale(0.8) rotate(-5deg); filter: blur(6px); }
            60%  { opacity: 1; transform: translateY(4px)   scale(1.05) rotate(1deg); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0)     scale(1)    rotate(0);    filter: blur(0); }
        }

        /* ─── Encrypted Badge ─── */
        .header-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.22);
            border-radius: 100px;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: #6ee7b7;
            letter-spacing: 0.3px;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success-primary);
            flex-shrink: 0;
            animation: pulseGlow 2s ease-out infinite;
        }

        @keyframes pulseGlow {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
            70%  { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }

        /* ============================================================
           CONTENT
           ============================================================ */
        .content {
            padding: 40px 36px;
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           STATUS SECTION
           ============================================================ */
        .status-section {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Outer wrapper for rings + icon */
        .status-icon-wrap {
            position: relative;
            width: 108px;
            height: 108px;
            margin: 0 auto 28px;
        }

        /* Outer spinning ring */
        .status-ring-outer {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(59,130,246,0.85);
            border-right-color: rgba(99,102,241,0.5);
            animation: spinRing 2.4s linear infinite;
            pointer-events: none;
        }
        /* Inner counter-spinning ring */
        .status-ring-inner {
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1.5px dashed rgba(255,255,255,0.07);
            animation: spinRing 6s linear infinite reverse;
            pointer-events: none;
        }

        @keyframes spinRing { to { transform: rotate(360deg); } }

        .status-icon {
            width: 108px;
            height: 108px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            transition: all 0.6s var(--ease-smooth);
            position: relative;
            z-index: 1;
        }

        /* State colours */
        .status-icon.connecting {
            border-color: rgba(245,158,11,0.35);
            animation: pulseAmber 2.2s ease-in-out infinite;
        }
        .status-icon.connected {
            border-color: rgba(16,185,129,0.5);
            box-shadow: 0 0 0 0 rgba(16,185,129,0), 0 16px 40px rgba(0,0,0,0.5);
        }
        .status-icon.transferring {
            border-color: rgba(59,130,246,0.5);
            animation: pulseBlue 1.6s ease-in-out infinite;
        }
        .status-icon.error {
            border-color: rgba(239,68,68,0.4);
            box-shadow: 0 0 24px rgba(239,68,68,0.12), 0 16px 40px rgba(0,0,0,0.5);
        }

        @keyframes pulseAmber {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.25), 0 16px 40px rgba(0,0,0,0.5); }
            50%       { box-shadow: 0 0 0 14px rgba(245,158,11,0), 0 16px 40px rgba(0,0,0,0.5); }
        }
        @keyframes pulseBlue {
            0%, 100% { box-shadow: 0 0 16px rgba(59,130,246,0.12), 0 16px 40px rgba(0,0,0,0.5); }
            50%       { box-shadow: 0 0 32px rgba(59,130,246,0.35), 0 16px 40px rgba(0,0,0,0.5); }
        }

        /* SVG icon inside circle */
        .status-svg {
            transition: all 0.5s var(--ease-smooth);
        }
        .status-icon.connecting  .status-svg { color: var(--warning-primary); }
        .status-icon.connected   .status-svg { color: var(--success-primary); }
        .status-icon.transferring .status-svg { color: var(--accent-primary); }
        .status-icon.error       .status-svg { color: var(--red-primary); }

        /* connecting SVG animation */
        .status-icon.connecting .spin-icon { animation: spinRing 1.2s linear infinite; }

        /* transferring pulse */
        .status-icon.transferring .status-svg {
            animation: iconPulse 1s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(59,130,246,0.7)); }
        }

        /* connected draw checkmark */
        .check-path {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
        }
        .status-icon.connected .check-path {
            animation: drawCheck 0.5s var(--ease-spring) 0.1s forwards;
        }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        /* complete glow burst */
        @keyframes successBurst {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.6), 0 16px 40px rgba(0,0,0,0.5); }
            40%  { box-shadow: 0 0 0 24px rgba(16,185,129,0), 0 16px 40px rgba(0,0,0,0.5); }
            100% { box-shadow: 0 0 20px rgba(16,185,129,0.15), 0 16px 40px rgba(0,0,0,0.5); }
        }

        .status-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .status-sub {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            color: #A0AAB2;
            letter-spacing: 0.3px;
        }

        /* ============================================================
           FILE LIST
           ============================================================ */
        #fileInfoSection { margin-bottom: 28px; }

        .files-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .files-header-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--slate-400);
        }

        .files-count-badge {
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.28);
            color: #93c5fd;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            padding: 3px 10px;
            border-radius: 999px;
        }

        /* ── File Card ── */
        .file-card {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.065);
            border-radius: 20px;
            margin-bottom: 10px;
            transition: all 0.35s var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }

        /* Left accent bar */
        .file-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 0 3px 3px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .file-card:hover {
            background: rgba(255,255,255,0.045);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .file-card:hover::before { opacity: 1; }

        .file-card.receiving {
            border-color: rgba(59,130,246,0.28);
            background: rgba(59,130,246,0.05);
        }

        .file-card.ready {
            border-color: rgba(16,185,129,0.28);
            background: rgba(16,185,129,0.04);
            animation: cardReady 0.5s var(--ease-bounce);
        }
        .file-card.ready::before {
            background: linear-gradient(180deg, var(--success-primary), #059669);
            opacity: 1;
        }
        @keyframes cardReady {
            0%  { transform: scale(0.99); }
            50% { transform: scale(1.012); }
            100%{ transform: scale(1); }
        }

        /* File type icon box */
        .file-card-icon {
            width: 46px; height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            flex-shrink: 0;
            transition: all 0.3s var(--ease-spring);
        }

        .file-card.ready .file-card-icon {
            background: rgba(16,185,129,0.12);
            border-color: rgba(16,185,129,0.3);
        }

        /* Type-specific colours */
        .file-card-icon.type-image  { color: #f472b6; background: rgba(244,114,182,0.1); border-color: rgba(244,114,182,0.2); }
        .file-card-icon.type-video  { color: #a78bfa; background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.2); }
        .file-card-icon.type-audio  { color: #fb923c; background: rgba(251,146,60,0.1);  border-color: rgba(251,146,60,0.2);  }
        .file-card-icon.type-zip    { color: #fbbf24; background: rgba(251,191,36,0.1);  border-color: rgba(251,191,36,0.2);  }
        .file-card-icon.type-code   { color: #34d399; background: rgba(52,211,153,0.1);  border-color: rgba(52,211,153,0.2);  }
        .file-card-icon.type-text   { color: #60a5fa; background: rgba(96,165,250,0.1);  border-color: rgba(96,165,250,0.2);  }
        .file-card-icon.type-file   { color: #94a3b8; background: rgba(148,163,184,0.08);border-color: rgba(148,163,184,0.15);}
        .file-card.ready .file-card-icon.type-image,
        .file-card.ready .file-card-icon.type-video,
        .file-card.ready .file-card-icon.type-audio,
        .file-card.ready .file-card-icon.type-zip,
        .file-card.ready .file-card-icon.type-code,
        .file-card.ready .file-card-icon.type-text,
        .file-card.ready .file-card-icon.type-file {
            color: var(--success-primary);
            background: rgba(16,185,129,0.12);
            border-color: rgba(16,185,129,0.3);
        }

        .file-card-info { flex: 1; min-width: 0; }
        .file-card-name {
            font-size: 13.5px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .file-card-meta {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--slate-400);
        }

        /* ── Download Button ── */
        .dl-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(16,185,129,0.18);
            border: 1px solid rgba(16,185,129,0.5);
            color: #6ee7b7;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.25s var(--ease-spring);
            white-space: nowrap;
        }
        .dl-btn:hover {
            background: var(--success-primary);
            color: #fff;
            box-shadow: 0 6px 20px rgba(16,185,129,0.4);
            transform: translateY(-1px);
        }
        .dl-btn:active { transform: scale(0.97); }
        .dl-btn svg { transition: transform 0.3s var(--ease-spring); }
        .dl-btn:hover svg { transform: translateY(2px); }

        /* ── Download All CTA ── */
        .dl-all-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 50%, var(--accent-primary) 100%);
            background-size: 200% 100%;
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            box-shadow:
                0 14px 36px rgba(16,185,129,0.36),
                inset 0 1px 0 rgba(255,255,255,0.15);
            transition: all 0.3s var(--ease-spring);
            margin-bottom: 28px;
            letter-spacing: 0.2px;
            animation: btnGradientShift 4s ease-in-out infinite;
        }
        @keyframes btnGradientShift {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }
        .dl-all-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 48px rgba(16,185,129,0.48), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .dl-all-btn:active { transform: translateY(0) scale(0.99); }
        .dl-all-btn .btn-icon {
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s var(--ease-spring);
        }
        .dl-all-btn:hover .btn-icon { transform: translateY(3px); }

        /* ============================================================
           PROGRESS BAR
           ============================================================ */
        .progress-section {
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(255,255,255,0.065);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 24px;
            margin-top: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label { font-size: 13px; font-weight: 500; color: var(--slate-400); }

        .progress-pct {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            color: var(--accent-primary);
            font-weight: 700;
        }

        .progress-bar-container {
            height: 6px;
            background: rgba(255,255,255,0.07);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
            background-size: 200% 100%;
            transition: width 0.4s var(--ease-smooth);
            box-shadow: 0 0 14px rgba(59,130,246,0.55);
            animation: progressShimmer 2s linear infinite;
        }

        @keyframes progressShimmer {
            0%   { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        /* Transfer speed / ETA chips */
        .progress-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .progress-chip {
            font-size: 10.5px;
            font-family: 'Space Mono', monospace;
            color: #A0AAB2;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 999px;
            padding: 3px 10px;
        }

        /* ============================================================
           ERROR STATE
           ============================================================ */
        .error-section {
            text-align: center;
            padding: 24px;
            background: rgba(239,68,68,0.05);
            border: 1px solid rgba(239,68,68,0.15);
            border-radius: 20px;
            margin-top: 16px;
            animation: shakeIn 0.4s var(--ease-spring);
        }
        @keyframes shakeIn {
            0%   { transform: translateX(0) scale(0.98); }
            25%  { transform: translateX(-4px); }
            50%  { transform: translateX(4px); }
            75%  { transform: translateX(-2px); }
            100% { transform: translateX(0) scale(1); }
        }

        .error-msg { color: #fca5a5; font-size: 14px; line-height: 1.65; margin-bottom: 20px; }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.25s var(--ease-spring);
        }
        .retry-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .retry-btn svg { transition: transform 0.5s; }
        .retry-btn:hover svg { transform: rotate(-360deg); }

        /* ============================================================
           SECURITY FOOTER PILL
           ============================================================ */
        .security-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(16,185,129,0.05);
            border: 1px solid rgba(16,185,129,0.14);
            border-radius: 100px;
            margin-top: 32px;
            transition: all 0.4s;
        }
        .security-footer:hover {
            border-color: rgba(16,185,129,0.28);
            background: rgba(16,185,129,0.09);
        }

        .security-footer-icon {
            color: var(--success-primary);
            display: flex;
            flex-shrink: 0;
            animation: shieldPulse 4s ease-in-out infinite;
        }
        @keyframes shieldPulse {
            0%, 100% { filter: drop-shadow(0 0 0 rgba(16,185,129,0)); }
            50%       { filter: drop-shadow(0 0 5px rgba(16,185,129,0.7)); }
        }

        .security-footer-text {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--slate-400);
            flex: 1;
        }

        /* ============================================================
           UTILITIES & ACCESSIBILITY
           ============================================================ */
        .hidden { display: none !important; }

        button:focus-visible, input:focus-visible, a:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
            border-radius: 4px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0);    }
        }
        .fade-in { animation: fadeInUp 0.45s var(--ease-smooth) both; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 640px) {
            body { padding: 16px; min-height: 100svh; }
            .container { max-width: 100%; animation: entranceMobile 0.5s ease-out both; }

            @keyframes entranceMobile {
                from { opacity: 0; transform: translateY(20px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .card { border-radius: 24px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
            .header { padding: 20px 18px; }
            .logo-group { gap: 10px; }
            .logo-mark { width: 50px; height: 50px; }
            .logo-text { font-size: 22px; }
            .header-badge { padding: 5px 10px; font-size: 10px; gap: 6px; }

            .content { padding: 24px 20px; }
            .status-section { margin-bottom: 32px; }
            .status-icon-wrap { width: 92px; height: 92px; }
            .status-icon { width: 92px; height: 92px; }
            .status-title { font-size: 20px; }
            .status-sub { font-size: 11px; }

            .dl-all-btn { padding: 14px 20px; font-size: 14px; border-radius: 14px; }
            .file-card { padding: 14px 16px; gap: 12px; border-radius: 16px; }
            .file-card-icon { width: 40px; height: 40px; border-radius: 11px; }
            .file-card-name { font-size: 12px; }
            .dl-btn { padding: 6px 12px; font-size: 11px; }

            .progress-section { padding: 16px 20px; border-radius: 16px; }
            .progress-label, .progress-pct { font-size: 11.5px; }

            .security-footer { margin-top: 24px; padding: 10px 16px; }
            .security-footer-text { font-size: 10px; }
        }
    </style>
</head>

<body>
    <!-- Ambient isometric grid (animated via CSS) -->
    <div class="iso-grid" aria-hidden="true"></div>
    <!-- Noise overlay -->
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Global Header -->
    <nav class="global-header">
        <div class="header-left">
            <a href="index.html" class="header-logo" title="Reset/Home">
                <svg viewBox="0 0 64 64" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 14h14c11 0 11 18 11 18s0 18-11 18H22" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 10v35l-6-6M22 45l6-6" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="36" cy="32" r="3" fill="#6366f1"/>
                </svg>
                DROPZONE
            </a>
        </div>
        <div class="header-right">
            <button class="header-link" onclick="openInfoModal('how')">How it Works</button>
            <button class="header-link" onclick="openInfoModal('faq')">FAQ</button>
            <div class="signaling-indicator" title="Signaling Server Status">
                <span class="sig-dot" id="globalSignalingDot"></span>
                <span id="globalSignalingText">Offline</span>
            </div>
            <a href="https://github.com/pranav662/DropZone" target="_blank" class="utility-icon" title="View Source on GitHub">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <!-- ── Header ── -->
            <div class="header">
                <div class="header-content">
                    <div class="logo-group">
                        <!-- SVG Logo Mark -->
                        <div class="logo-mark">
                            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
                                        <stop offset="0%" stop-color="#3b82f6"/>
                                        <stop offset="100%" stop-color="#2dd4bf"/>
                                    </linearGradient>
                                    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
                                        <feGaussianBlur stdDeviation="2" result="blur"/>
                                        <feMerge>
                                            <feMergeNode in="blur"/>
                                            <feMergeNode in="SourceGraphic"/>
                                        </feMerge>
                                    </filter>
                                </defs>
                                
                                <!-- Outer 'D' shape -->
                                <path d="M22 14h14c11 0 11 18 11 18s0 18-11 18H22" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlow)"/>
                                
                                <!-- Drop Arrow (replacing the vertical bar of the D) -->
                                <path d="M22 10v35l-6-6M22 45l6-6" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlow)"/>
                                
                                <!-- Zone Marker -->
                                <circle cx="36" cy="32" r="3" fill="#6366f1" filter="url(#logoGlow)">
                                    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
                                </circle>
                            </svg>
                        </div>
                        <h1 class="logo-text" aria-label="DROPZONE">
                            <span class="logo-letter" style="--i:0">D</span><span class="logo-letter" style="--i:1">R</span><span class="logo-letter" style="--i:2">O</span><span class="logo-letter" style="--i:3">P</span><span class="logo-letter" style="--i:4">Z</span><span class="logo-letter" style="--i:5">O</span><span class="logo-letter" style="--i:6">N</span><span class="logo-letter" style="--i:7">E</span>
                        </h1>
                    </div>
                    <div class="header-badge">
                        <span class="badge-dot"></span>
                        <span>P2P Encrypted</span>
                    </div>
                </div>
            </div>

            <div class="content">
                <!-- ── Status Section ── -->
                <div class="status-section" id="statusSection">
                    <div class="status-icon-wrap">
                        <div class="status-ring-outer" id="statusRingOuter"></div>
                        <div class="status-ring-inner"></div>
                        <div class="status-icon connecting" id="statusIcon">
                            <!-- Connecting icon (clock/spinner) — swapped by JS -->
                            <svg class="status-svg spin-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="9" stroke-opacity="0.25"/>
                                <path d="M12 3 A9 9 0 0 1 21 12" stroke-width="2"/>
                            </svg>
                        </div>
                    </div>
                    <h2 class="status-title" id="statusText">Connecting to sender...</h2>
                    <p class="status-sub"  id="statusSub">Negotiating secure P2P tunnel</p>
                </div>

                <!-- ── Download All Button ── -->
                <div id="actionArea" class="hidden">
                    <button class="dl-all-btn" id="downloadAllBtn">
                        <span class="btn-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </span>
                        Download All Files
                    </button>
                </div>

                <!-- ── File List ── -->
                <div id="fileInfoSection" class="hidden">
                    <div class="files-header">
                        <span class="files-header-label">Files</span>
                        <span class="files-count-badge" id="filesCountBadge">0 files</span>
                    </div>
                    <div id="filesList"></div>
                </div>

                <!-- ── Progress Bar ── -->
                <div id="progressSection" class="progress-section hidden">
                    <div class="progress-header">
                        <span class="progress-label" id="progressLabel">Receiving data...</span>
                        <span class="progress-pct"   id="progressPct">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <div class="progress-meta">
                        <span class="progress-chip" id="progressChip">Direct P2P</span>
                        <span class="progress-chip">DTLS 1.3 Encrypted</span>
                    </div>
                </div>

                <!-- ── Error Section ── -->
                <div id="errorSection" class="error-section hidden">
                    <p class="error-msg" id="errorText"></p>
                    <button class="retry-btn" onclick="location.reload()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                        Retry Connection
                    </button>
                </div>

                <!-- ── Security Footer ── -->
                <div class="security-footer">
                    <div class="security-footer-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <span class="security-footer-text" id="securityBadgeText">End-to-end P2P encrypted • Verifying protocol...</span>
                </div>

                <!-- NEW TRANSFER BTN -->
                <a href="index.html" id="newTransferBtn" class="browse-btn" style="display: none; margin-top: 12px; width: 100%; text-align: center; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: var(--slate-300); padding: 16px;">
                    Start a New Transfer
                </a>

            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/webrtc.js?v=19"></script>
    <script>
        window.BACKEND_URL = window.location.origin;

        const roomId = window.location.pathname.split('/p2p/')[1] || window.location.search.split('?room=')[1];

        const statusIcon      = document.getElementById('statusIcon');
        const statusRingOuter = document.getElementById('statusRingOuter');
        const statusText      = document.getElementById('statusText');
        const statusSub       = document.getElementById('statusSub');
        const fileInfoSection = document.getElementById('fileInfoSection');
        const filesList       = document.getElementById('filesList');
        const filesCountBadge = document.getElementById('filesCountBadge');
        const progressSection = document.getElementById('progressSection');
        const progressLabel   = document.getElementById('progressLabel');
        const progressPct     = document.getElementById('progressPct');
        const progressFill    = document.getElementById('progressFill');
        const progressChip    = document.getElementById('progressChip');
        const actionArea      = document.getElementById('actionArea');
        const downloadAllBtn  = document.getElementById('downloadAllBtn');
        const errorSection    = document.getElementById('errorSection');
        const errorText       = document.getElementById('errorText');

        let webrtc   = null;
        let senderId = null;
        let allFilesData = [];

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // ─────────────────────────────────────────────────────────
        // STATUS ICON SVGs — clean, per-state
        // ─────────────────────────────────────────────────────────
        const STATUS_ICONS = {
            connecting: `<svg class="status-svg spin-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9" stroke-opacity="0.2"/>
                <path d="M12 3 A9 9 0 0 1 21 12" stroke-width="2.2"/>
            </svg>`,
            connected: `<svg class="status-svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline class="check-path" points="20 6 9 17 4 12"/>
            </svg>`,
            transferring: `<svg class="status-svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>`,
            complete: `<svg class="status-svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline class="check-path" points="22 4 12 14.01 9 11.01"/>
            </svg>`,
            'sender-offline': `<svg class="status-svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18.36 6.64A9 9 0 1 1 5.64 19.36"/>
                <polyline points="23 4 23 10 17 10"/>
            </svg>`,
            error: `<svg class="status-svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>`,
        };

        function setStatus(state, text, sub) {
            statusIcon.innerHTML  = STATUS_ICONS[state] || STATUS_ICONS.connecting;
            statusIcon.className  = 'status-icon ' + state;
            statusText.textContent = text;
            statusSub.textContent  = sub;

            // Adjust outer ring speed
            const dur = state === 'transferring' ? '0.7s' : state === 'error' ? '5s' : '2.4s';
            const op  = state === 'error' ? '0.3' : '1';
            statusRingOuter.style.animationDuration = dur;
            statusRingOuter.style.opacity = op;

            // Burst animation on complete & remove spinner rings
            if (state === 'complete' || state === 'connected') {
                statusIcon.style.animation = 'successBurst 0.7s ease-out forwards';
            }
            if (state === 'complete') {
                statusRingOuter.style.display = 'none';
                document.querySelector('.status-ring-inner').style.display = 'none';
                document.getElementById('newTransferBtn').style.display = 'block';
            } else {
                statusRingOuter.style.display = 'block';
                document.querySelector('.status-ring-inner').style.display = 'block';
            }
        }

        // ─────────────────────────────────────────────────────────
        // FILE TYPE INFO — icon + class
        // ─────────────────────────────────────────────────────────
        function getFileTypeInfo(name) {
            const ext = (name.split('.').pop() || '').toLowerCase();
            if (['jpg','jpeg','png','gif','webp','svg','bmp','ico','tiff'].includes(ext))
                return { cls: 'type-image', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>` };
            if (['mp4','mov','avi','mkv','webm','m4v'].includes(ext))
                return { cls: 'type-video', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>` };
            if (['mp3','wav','flac','aac','ogg','m4a'].includes(ext))
                return { cls: 'type-audio', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>` };
            if (['zip','rar','7z','tar','gz','bz2','xz'].includes(ext))
                return { cls: 'type-zip', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>` };
            if (['js','ts','jsx','tsx','py','java','c','cpp','cs','go','rs','rb','php','html','css','json','yaml','yml','sh'].includes(ext))
                return { cls: 'type-code', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>` };
            if (['txt','md','doc','docx','pdf','rtf','odt'].includes(ext))
                return { cls: 'type-text', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>` };
            return { cls: 'type-file', svg: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>` };
        }

        function updateFilesDisplay(files) {
            allFilesData = files;
            fileInfoSection.classList.remove('hidden');
            filesCountBadge.textContent = files.length === 1 ? '1 file' : `${files.length} files`;

            filesList.innerHTML = files.map((f, i) => {
                const { cls, svg } = getFileTypeInfo(f.name);
                return `
                <div class="file-card fade-in" id="file-card-${i}" style="animation-delay:${i * 70}ms">
                    <div class="file-card-icon ${cls}" id="file-icon-${i}">${svg}</div>
                    <div class="file-card-info">
                        <div class="file-card-name" title="${f.name}">${f.name}</div>
                        <div class="file-card-meta">${formatFileSize(f.size)}</div>
                    </div>
                    <div class="file-card-action" id="file-action-${i}">
                        <button class="dl-btn hidden" id="dl-btn-${i}" onclick="downloadFile(${i})">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Save
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        window.downloadFile = (index) => {
            if (webrtc && senderId) { webrtc.downloadFile(senderId, index); }
        };

        downloadAllBtn.onclick = () => {
            if (webrtc && senderId) { webrtc.downloadAll(senderId); }
        };

        async function init() {
            if (!roomId) {
                setStatus('error', 'Invalid link', 'No room ID found in URL');
                return;
            }

            try {
                const res  = await fetch(`${window.BACKEND_URL}/api/room/${roomId}`);
                const data = await res.json();

                if (!data.active) {
                    setStatus('error', 'Share expired', 'This link is no longer available');
                    errorSection.classList.remove('hidden');
                    errorText.textContent = 'This share session has ended or never started.';
                    return;
                }

                if (data.files) { updateFilesDisplay(data.files); }
            } catch (e) {
                console.warn('[Init] Initial room check failed:', e);
            }

            webrtc = new window.DropZoneWebRTC();

            const originalOnOffer = webrtc._onOffer.bind(webrtc);
            webrtc._onOffer = async (data) => {
                senderId = data.senderId;
                return originalOnOffer(data);
            };

            webrtc.onStatusChange = (status) => {
                switch (status) {
                    case 'connecting':
                        setStatus('connecting', 'Connecting...', 'Negotiating secure P2P tunnel');
                        break;
                    case 'connected':
                        setStatus('connected', 'Connected!', 'Ready to receive encrypted data');
                        break;
                    case 'transferring':
                        setStatus('transferring', 'Receiving...', 'Direct P2P transfer in progress');
                        progressSection.classList.remove('hidden');
                        break;
                    case 'complete':
                        setStatus('complete', 'Transfer Complete', 'All files received successfully');
                        progressFill.style.width = '100%';
                        progressPct.textContent  = '100%';
                        progressLabel.textContent= 'Transfer complete!';
                        progressChip.textContent = '✓ Done';
                        actionArea.classList.remove('hidden');
                        document.querySelectorAll('[id^="dl-btn-"]').forEach(btn  => btn.classList.remove('hidden'));
                        document.querySelectorAll('[id^="file-card-"]').forEach(card => card.classList.add('ready'));
                        break;
                    case 'sender-offline':
                        setStatus('sender-offline', 'Sender Offline', 'Waiting for sender to reconnect...');
                        break;
                    case 'error':
                        setStatus('error', 'Connection failed', 'Please retry or check your network');
                        errorSection.classList.remove('hidden');
                        break;
                }
            };

            webrtc.onSecurityStats = (stats) => {
                const el = document.getElementById('securityBadgeText');
                if (el) el.innerHTML = `Verified <strong style="color:#fff">${stats.version}</strong> • E2E Encrypted • Direct P2P`;
            };

            webrtc.onProgress = (info) => {
                const pct = Math.round(info.progress);
                progressFill.style.width  = pct + '%';
                progressPct.textContent   = pct + '%';
                progressLabel.textContent = `Receiving ${info.fileName}...`;
            };

            webrtc.onFileReceived = (file) => {
                const card = document.getElementById(`file-card-${file.fileIndex}`);
                const btn  = document.getElementById(`dl-btn-${file.fileIndex}`);
                if (card) card.classList.add('ready');
                if (btn)  btn.classList.remove('hidden');
            };

            webrtc.onError = (msg) => {
                errorSection.classList.remove('hidden');
                errorText.textContent = msg;
            };

            try {
                webrtc.onSignalingStatus = function(status) {
                    const dot = document.getElementById('globalSignalingDot');
                    const text = document.getElementById('globalSignalingText');
                    if (dot && text) {
                        if (status === 'online') {
                            dot.className = 'sig-dot online';
                            text.textContent = 'Online';
                        } else {
                            dot.className = 'sig-dot';
                            text.textContent = 'Offline';
                        }
                    }
                };

                await webrtc.connect(window.BACKEND_URL);
                await webrtc.joinRoom(roomId);
            } catch (e) {
                setStatus('error', 'Connection failed', e.message);
                errorSection.classList.remove('hidden');
                errorText.textContent = 'Could not connect to the signaling server.';
            }
        }

        // Generic Info Modal Content
        const modalData = {
            'how': {
                title: 'How DropZone Works',
                body: `
                    <h3>Pure P2P Technology</h3>
                    <p>DropZone operates on WebRTC (Web Real-Time Communication) to establish a direct connection between your browser and the receiver's browser. Once the P2P connection is initialized, files flow directly without passing through our servers.</p>
                    <h3>Signaling vs. Storage</h3>
                    <p>We use a lightweight signaling server purely to execute the handshake (exchanging connection details) between peers. Once connected, the signaling server drops out. <strong>Your files are never stored, cached, or processed on our backend.</strong></p>
                `
            },
            'faq': {
                title: 'Frequently Asked Questions',
                body: `
                    <h3>Is there a file size limit?</h3>
                    <p>DropZone itself does not enforce a limit, but browsers have memory constraints when handling massive files in RAM via WebRTC. For files over 10GB, we recommend ensuring you are on a desktop device with stable memory overhead.</p>
                    <h3>What happens if I close the tab?</h3>
                    <p>Since this is a strict peer-to-peer connection, if the sender closes their tab, the transfer breaks instantly. Both the sender and receiver must keep the application open until the transfer is 100% complete.</p>
                    <h3>Does it work on mobile?</h3>
                    <p>Yes, DropZone requires only a modern browser. However, strict firewalls or mobile hotspots with "AP Isolation" might block direct connections.</p>
                `
            },
            'privacy': {
                title: 'Privacy Policy',
                body: `
                    <h3>No Server Storage</h3>
                    <p>Your privacy is our core principle. DropZone does not upload, process, or store any of your files. All byte transfers occur securely and directly between peers.</p>
                    <h3>Data Collection</h3>
                    <p>We do not collect identifiable personal data, contact lists, or file metadata. P2P Session IDs are generated ephemerally and discarded once the room closes.</p>
                    <h3>Contact Storage</h3>
                    <p>The "Contacts" and "History" features rely entirely on your browser's local storage (IndexedDB / localStorage). If you clear your browser data, your DropZone history is permanently deleted. We do not sync this to the cloud.</p>
                `
            },
            'terms': {
                title: 'Terms of Service',
                body: `
                    <h3>Acceptable Use</h3>
                    <p>By using DropZone, you agree not to use the service to transfer illegal, malicious, or highly restricted materials. While we cannot monitor or inspect file contents due to the end-to-end encrypted nature of the platform, you remain fully responsible for the data you share.</p>
                    <h3>Encryption & Liability</h3>
                    <p>Transfers are protected via DTLS 1.3 encryption, ensuring the data stream cannot be intercepted. However, DropZone is provided "as is" with no warranties regarding uptime, delivery guarantees, or data integrity.</p>
                `
            }
        };

        window.openInfoModal = function(type) {
            const data = modalData[type];
            if (!data) return;
            
            document.getElementById('genericModalTitle').innerHTML = data.title;
            document.getElementById('genericModalBody').innerHTML = data.body;
            document.getElementById('genericModalOverlay').classList.add('active');
        };

        const closeGenericModal = document.getElementById('closeGenericModal');
        if (closeGenericModal) {
            closeGenericModal.addEventListener('click', () => {
                document.getElementById('genericModalOverlay').classList.remove('active');
            });
        }
        const genericModalOverlay = document.getElementById('genericModalOverlay');
        if (genericModalOverlay) {
            genericModalOverlay.addEventListener('click', (e) => {
                if (e.target === genericModalOverlay) {
                    genericModalOverlay.classList.remove('active');
                }
            });
        }

        init();
    </script>

    <!-- Global Footer -->
    <footer class="global-footer">
        <div class="footer-left">
            <span class="footer-text">Powered by WebRTC &amp; DTLS 1.3</span>
            <span class="footer-text">© 2024 DropZone P2P</span>
        </div>
        <div class="footer-right">
            <button class="footer-link" onclick="openInfoModal('privacy')">Privacy Policy</button>
            <button class="footer-link" onclick="openInfoModal('terms')">Terms of Service</button>
            <a href="mailto:support@dropzone.local" class="footer-link">Contact</a>
        </div>
    </footer>

    <!-- Generic Info Modal -->
    <div class="generic-modal-overlay" id="genericModalOverlay">
        <div class="generic-modal">
            <div class="modal-header">
                <h2 id="genericModalTitle">Title</h2>
                <button class="modal-close" id="closeGenericModal" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body" id="genericModalBody">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>
</body>
</html>
