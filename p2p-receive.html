<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receiving File - DropZone P2P</title>
    <meta name="description" content="Receive files securely via WebRTC P2P transfer with DTLS 1.3 encryption.">
    <link rel="stylesheet" href="../styles.css?v=11">
    <style>
        /* Specific overrides for receiver page to ensure local layout consistency before global CSS loads */
        .download-btn-sm {
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .download-btn-sm:hover {
            background: #10b981;
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        
        .download-all-btn {
            width: 100%;
            margin-bottom: 20px;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .file-item-actions {
            margin-left: auto;
            flex-shrink: 0;
            display: none; /* Only show when file is ready */
        }

        .file-item-actions.active {
            display: block;
        }

        .receiver-status-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: all 0.4s;
        }
        
        .receiver-status-icon.connecting { color: var(--warning-primary); border-color: rgba(245, 158, 11, 0.3); animation: status-pulse-amber 2s infinite; }
        .receiver-status-icon.connected { color: var(--success-primary); border-color: rgba(16, 185, 129, 0.3); }
        .receiver-status-icon.transferring { color: var(--accent-primary); border-color: rgba(59, 130, 246, 0.3); animation: status-pulse-blue 1.5s infinite; }
        .receiver-status-icon.error { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        @keyframes status-pulse-amber { 0%, 100% { transform: scale(1); border-color: rgba(245, 158, 11, 0.3); } 50% { transform: scale(1.05); border-color: rgba(245, 158, 11, 0.6); } }
        @keyframes status-pulse-blue { 0%, 100% { transform: scale(1); border-color: rgba(59, 130, 246, 0.3); } 50% { transform: scale(1.05); border-color: rgba(59, 130, 246, 0.6); } }

        .hidden { display: none !important; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="header-content">
                    <div>
                        <h1 class="logo">DROPZONE</h1>
                        <p class="subtitle">P2P SECURE TRANSFER • NO SERVER STORAGE</p>
                    </div>
                </div>
            </div>

            <div class="content">
                <!-- Status -->
                <div id="statusSection" style="text-align: center; margin-bottom: 40px;">
                    <div class="receiver-status-icon connecting" id="statusIcon">⏳</div>
                    <h2 id="statusText" style="margin-bottom: 8px;">Connecting to sender...</h2>
                    <p id="statusSub" style="opacity: 0.6; font-size: 14px; font-family: 'Space Mono', monospace;">Negotiating secure P2P tunnel...</p>
                </div>

                <!-- Actions (Download All) -->
                <div id="actionArea" class="hidden">
                    <button id="downloadAllBtn" class="browse-btn download-all-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download All Files
                    </button>
                </div>

                <!-- File List Area -->
                <div id="fileInfoSection" class="hidden">
                    <div id="filesList"></div>
                </div>

                <!-- Progress Bar -->
                <div id="progressSection" class="hidden" style="margin-top: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                        <span id="progressLabel" style="font-weight: 500;">Receiving data...</span>
                        <span id="progressPct" style="font-family: 'Space Mono', monospace; color: var(--accent-primary);">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressFill" style="width: 0%;"></div>
                    </div>
                </div>

                <!-- Error area -->
                <div id="errorSection" class="hidden" style="text-align: center; margin-top: 20px;">
                    <p id="errorText" style="color: #fca5a5; margin-bottom: 20px;"></p>
                    <button class="browse-btn" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);" onclick="location.reload()">Retry Connection</button>
                </div>

                <!-- Security Footer -->
                <div class="p2p-status" id="securityBadge" style="margin-top: 40px; margin-bottom: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span id="securityBadgeText" style="font-size: 12px; font-family: 'Space Mono', monospace; opacity: 0.8;">End-to-end P2P encrypted • Verifying protocol...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.IO + WebRTC -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../webrtc.js?v=11"></script>
    <script>
        window.BACKEND_URL = window.location.origin;
        
        const roomId = window.location.pathname.split('/p2p/')[1] || window.location.search.split('?room=')[1];
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const statusSub = document.getElementById('statusSub');
        const fileInfoSection = document.getElementById('fileInfoSection');
        const filesList = document.getElementById('filesList');
        const progressSection = document.getElementById('progressSection');
        const progressLabel = document.getElementById('progressLabel');
        const progressPct = document.getElementById('progressPct');
        const progressFill = document.getElementById('progressFill');
        const actionArea = document.getElementById('actionArea');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const errorSection = document.getElementById('errorSection');
        const errorText = document.getElementById('errorText');

        let webrtc = null;
        let senderId = null;

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function setStatus(icon, text, sub, iconClass) {
            statusIcon.textContent = icon;
            statusIcon.className = 'receiver-status-icon ' + iconClass;
            statusText.textContent = text;
            statusSub.textContent = sub;
        }

        function updateFilesDisplay(files) {
            fileInfoSection.classList.remove('hidden');
            filesList.innerHTML = files.map((f, i) => `
                <div class="file-info" id="file-${i}">
                    <div class="file-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                    </div>
                    <div class="file-details">
                        <div style="font-weight: 600; font-size: 15px;">${f.name}</div>
                        <div style="font-size: 12px; opacity: 0.6; font-family: 'Space Mono', monospace;">${formatFileSize(f.size)}</div>
                    </div>
                    <div class="file-item-actions" id="actions-${i}">
                        <button class="download-btn-sm" onclick="downloadFile(${i})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Download
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.downloadFile = (index) => {
            if (webrtc && senderId) {
                webrtc.downloadFile(senderId, index);
            }
        };

        downloadAllBtn.onclick = () => {
            if (webrtc && senderId) {
                webrtc.downloadAll(senderId);
            }
        };

        async function init() {
            if (!roomId) {
                setStatus('❌', 'Invalid link', 'No room ID found in URL', 'error');
                return;
            }

            try {
                const backendUrl = window.BACKEND_URL;
                const res = await fetch(`${backendUrl}/api/room/${roomId}`);
                const data = await res.json();

                if (!data.active) {
                    setStatus('❌', 'Share expired', 'This link is no longer available', 'error');
                    errorSection.classList.remove('hidden');
                    errorText.textContent = 'This share session has ended.';
                    return;
                }

                if (data.files) {
                    updateFilesDisplay(data.files);
                }
            } catch (e) {
                console.warn('[Init] Initial room check failed:', e);
            }

            webrtc = new window.DropZoneWebRTC();
            
            // Re-capture senderId when offer arrives
            const originalOnOffer = webrtc._onOffer.bind(webrtc);
            webrtc._onOffer = async (data) => {
                senderId = data.senderId;
                return originalOnOffer(data);
            };

            webrtc.onStatusChange = (status) => {
                switch (status) {
                    case 'connecting':
                        setStatus('🔗', 'Connecting...', 'Negotiating secure P2P tunnel', 'connecting');
                        break;
                    case 'connected':
                        setStatus('🤝', 'Connected!', 'Ready to receive encrypted data', 'connected');
                        break;
                    case 'transferring':
                        setStatus('📡', 'Receiving...', 'Direct P2P transfer in progress', 'transferring');
                        progressSection.classList.remove('hidden');
                        break;
                    case 'complete':
                        setStatus('✅', 'Ready!', 'File(s) transferred successfully', 'connected');
                        progressFill.style.width = '100%';
                        progressPct.textContent = '100%';
                        progressLabel.textContent = 'Transfer Complete!';
                        actionArea.classList.remove('hidden');
                        
                        // Activate all individual download buttons
                        document.querySelectorAll('.file-item-actions').forEach(el => el.classList.add('active'));
                        break;
                    case 'sender-offline':
                        setStatus('⏸️', 'Sender Offline', 'Waiting for sender to return...', 'error');
                        break;
                    case 'error':
                        setStatus('❌', 'Connection failed', 'Please try again or check network', 'error');
                        errorSection.classList.remove('hidden');
                        break;
                }
            };
            
            webrtc.onSecurityStats = (stats) => {
                const badgeText = document.getElementById('securityBadgeText');
                if (badgeText) {
                    badgeText.innerHTML = `Verified <strong style="color:white">${stats.version}</strong> • E2E Encrypted • Direct P2P`;
                }
            };

            webrtc.onProgress = (info) => {
                const pct = Math.round(info.progress);
                progressFill.style.width = pct + '%';
                progressPct.textContent = pct + '%';
                progressLabel.textContent = `Receiving ${info.fileName}...`;
            };

            webrtc.onFileReceived = (file) => {
                // Single file ready - can show its button earlier if desired
                const actionBtn = document.getElementById(`actions-${file.fileIndex}`);
                if (actionBtn) actionBtn.classList.add('active');
            };

            webrtc.onError = (msg) => {
                errorSection.classList.remove('hidden');
                errorText.textContent = msg;
            };

            try {
                await webrtc.connect(window.BACKEND_URL);
                if (webrtc.socket) {
                    console.log('[Receive] Signaling connected to', window.BACKEND_URL);
                }
                await webrtc.joinRoom(roomId);
            } catch (e) {
                setStatus('❌', 'Connection failed', e.message, 'error');
                errorSection.classList.remove('hidden');
                errorText.textContent = 'Could not connect to the signaling server.';
            }
        }

        init();
    </script>
</body>

</html>
