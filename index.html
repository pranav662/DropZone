<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROPZONE - P2P Secure File Sharing</title>
    <meta name="description"
        content="Share files directly between browsers using WebRTC with DTLS 1.3 encryption. No server storage, completely private.">
    <link rel="stylesheet" href="styles.css?v=12">
</head>

<body>
    <div class="container">
        <!-- Main Card -->
        <div class="card" id="mainCard">
            <!-- Header -->
            <div class="header">
                <div class="header-content">
                    <div>
                        <h1 class="logo">DROPZONE</h1>
                        <p class="subtitle">P2P secure file sharing • DTLS 1.3</p>
                    </div>
                    <button id="resetBtn" class="reset-btn hidden">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content">
                <!-- STATE 1: FILE SELECT AREA -->
                <div id="uploadState" class="state active">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-content">
                            <div class="icon-container" id="uploadIcon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>

                            <div class="drop-zone-text">
                                <h2>Drag and drop files here</h2>
                                <p class="info-text" style="margin-bottom: 24px;">Direct P2P transfer • No size limit • DTLS 1.3 encrypted</p>
                            </div>

                            <input type="file" id="fileInput" hidden multiple>
                            <label for="fileInput" class="browse-btn" style="margin-top: 10px;">Browse Files</label>
                        </div>
                    </div>

                    <!-- Active Sessions (Reconnection) -->
                    <div id="activeSessionsPanel" class="active-sessions hidden">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                            </svg>
                            Active Shares
                        </h3>
                        <div id="sessionsList"></div>
                    </div>
                </div>

                <!-- STATE 2: CONNECTING (brief) -->
                <div id="uploadingState" class="state">
                    <div class="file-info">
                        <div class="file-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                        </div>
                        <div class="file-details">
                            <h3 id="fileName">filename.pdf</h3>
                            <p id="fileSize">0 MB</p>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span class="progress-label">Setting up P2P room...</span>
                            <span class="progress-percent" id="progressPercent"></span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                </div>

                <!-- STATE 3: SHARING OPTIONS -->
                <div id="sharingState" class="state">
                    <!-- File Info + P2P Status -->
                    <div class="file-info success">
                        <div class="file-icon success">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        <div class="file-details">
                            <h3 id="fileNameComplete">filename.pdf</h3>
                            <p id="fileSizeComplete">0 MB</p>
                        </div>
                    </div>

                    <!-- P2P Status Badge -->
                    <div class="p2p-status" id="p2pStatus">
                        <span class="p2p-dot live" id="p2pDot"></span>
                        <span class="p2p-label" id="p2pLabel">P2P Active — Waiting for receivers</span>
                        <span class="p2p-peers" id="peerCount"></span>
                        <span class="p2p-dtls-version" id="p2pDtlsVersion">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <span id="p2pDtlsText">DTLS</span>
                        </span>
                    </div>

                    <!-- Unified Sharing Section -->
                    <div class="sharing-container">
                        <div class="share-heading">
                            <h2>Share Your File</h2>
                            <p class="info-text">Choose a sharing method below</p>
                        </div>

                        <!-- Method 1: Link -->
                        <div class="sharing-method-card">
                            <label class="input-label">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                P2P Share Link
                            </label>
                            <div class="link-container">
                                <input type="text" id="shareLink" class="share-input" readonly value="">
                                <button id="copyBtn" class="copy-btn">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                    <span id="copyBtnText">Copy</span>
                                </button>
                            </div>
                        </div>

                        <div class="sharing-grid">
                            <!-- Method 2: Email -->
                            <div class="sharing-method-card">
                                <label class="input-label">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                                    Send via Email
                                </label>
                                <form id="emailForm">
                                    <div class="form-group">
                                        <input type="email" id="recipientEmail" class="form-input"
                                            placeholder="friend@email.com" required>
                                    </div>
                                    <button type="submit" id="sendEmailBtn" class="submit-btn" style="width: 100%;">
                                        <span>Send Link</span>
                                    </button>
                                </form>
                            </div>

                            <!-- Method 3: QR Code -->
                            <div class="sharing-method-card">
                                <label class="input-label">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                                    Scan QR Code
                                </label>
                                <div class="qr-compact-container">
                                    <div class="qr-code" id="qrCode"></div>
                                    <button id="downloadQrBtn" class="icon-only-btn" title="Download QR">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox hidden">
        <span id="closeLightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImg">
    </div>

    <!-- Socket.IO + WebRTC Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="webrtc.js?v=12"></script>
    <script src="script.js?v=8"></script>
    <!-- Backend configuration for hosting -->
    <script>
        window.BACKEND_URL = 'https://dropzone-66yr.onrender.com';
    </script>
</body>

</html>
